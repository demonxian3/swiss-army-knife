server {
        listen        443 ssl;
        ssl_certificate C:/Users/demon/ssl/rds.com.pem;
        ssl_certificate_key C:/Users/demon/ssl/rds.com.key.pem;
        ssl_session_timeout 5m;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;
        server_name  rds.com;
        root C:/Users/demon/Desktop/rds/dist;

        location / {
            index index.html;
            try_files $uri /index.html;
            autoindex on;
            gzip on;
            add_header Access-Control-Allow-Origin '*';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, OPTIONS';
            add_header Access-Control-Expose-Headers 'Accept-Ranges, Content-Encoding, Content-Length, Content-Range';
        }

        location /apiv1/ {
            proxy_pass https://getpantry.cloud;
            proxy_set_header Host getpantry.cloud;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;

            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
}